# Copy to:
#   Linux:   ~/.config/llm-usage/config.toml
#   macOS:   ~/Library/Application Support/dev.buffbit.llm-usage/config.toml

# How often to refresh every provider. 15 minutes by default.
# Anthropic's /api/oauth/usage rate-limits aggressive polling; bumping this
# below ~5 minutes risks 429s and the tray will back off automatically.
poll_interval_secs = 900

# How often the tray icon swaps to the next quota-bearing provider's gauge.
# Default 15 s; clamps to a minimum of 5 s.
icon_rotation_secs = 15

# Draw a 1 px magenta line across each tray-icon bar at the elapsed fraction
# of the corresponding time window. Off keeps the icon as just the fill bars.
show_pace_marker = true

# Once a day, the tray asks GitHub whether a newer release has been
# tagged and surfaces a menu item / one-time notification if so. The
# only outbound HTTP call that isn't to a data provider. Off skips it
# entirely.
check_for_updates = true

# When true, the dashboard creates an OS login item for llm-usage-tray
# so the menu-bar icon starts again after you sign in.
start_at_login = false

# Optional path to opencode's SQLite store (https://opencode.ai). Each
# provider consults it for per-message token activity scoped to its
# own providerID and folds the result into its native aggregates.
# Leave commented to use the XDG default (~/.local/share/opencode/opencode.db).
# Set to "" to disable the integration entirely.
# opencode_db = "/home/you/.local/share/opencode/opencode.db"

[anthropic]
enabled = true
# When false (default), only quota usage is shown. Flip to true to display
# dollar spend, the weekly $ budget bar, and the 14-day spend chart.
show_spend = false
# Defaults to ~/.claude/projects
# claude_projects_dir = "/path/to/.claude/projects"
weekly_budget_usd = 50.0
# daily_budget_usd  = 10.0
# Comma-separated fractions 0.0..1.0 at which to fire a quota alert.
warn_at = [0.5, 0.75, 0.9]

[codex_cli]
enabled = true
# When false (default) only quota fractions are shown; flip to true to also
# display the reverse-engineered $ estimate.
show_spend = false
# Defaults to ~/.codex
# codex_dir = "/path/to/.codex"
warn_at = [0.75, 0.9]

[antigravity]
enabled = false
# Uses the Antigravity keyring token by default:
#   Linux secret-service: service=gemini username=antigravity
#   macOS keychain: account=antigravity
# Defaults to https://cloudcode-pa.googleapis.com; Antigravity logs may show
# daily-cloudcode-pa.googleapis.com, but prod exposes the same quota RPC.
# base_url = "https://cloudcode-pa.googleapis.com"
# access_token_command = "some-command-that-prints-a-google-oauth-access-token"
warn_at = [0.75, 0.9]

[ollama_cloud]
enabled = false
# The dashboard's "Import from browser…" or "Sign in via popup window…"
# buttons populate this for you. The URL is hardcoded to ollama.com.
# session_cookie = "session=…; csrf=…"
warn_at = [0.75, 0.9]

[alerts]
# Currently informational — alerts are throttled by window_id
# (one alert per provider × threshold × hour/week/month bucket)
# rather than by a time-based debounce. The field is kept so a
# future time-throttle has somewhere to live, and so existing
# configs don't fail to parse. Default = 3600s.
debounce_secs = 3600
# Set true to silence all desktop notifications.
disabled = false
