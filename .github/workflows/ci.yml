name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: test (core, no GUI deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p llm-usage-core
      - run: cargo run -p llm-usage-core --example print_snapshots
        env:
          # Don't actually need network in CI; the example handles missing
          # endpoints gracefully and prints "[Unavailable]" rows.
          LLM_USAGE_CONFIG: ${{ github.workspace }}/packaging/test/empty-config.toml

  build-linux:
    name: build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            pkg-config libssl-dev
      # Run the full workspace test suite — the dashboard / tray / cli
      # crates have GUI deps the test-core job can't install. Keeping
      # both jobs means a pure-core regression still fast-fails.
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --release -p llm-usage-tray -p llm-usage-dashboard -p llm-usage-setup -p llm-usage
      - uses: actions/upload-artifact@v4
        with:
          name: llm-usage-linux-x86_64
          path: |
            target/release/llm-usage-tray
            target/release/llm-usage-dashboard
            target/release/llm-usage-setup
            target/release/llm-usage

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    # Pinning the floor at 60 % keeps regressions visible without
    # locking in today's exact 67 %. Bump as new tests land.
    env:
      LINE_COVERAGE_FLOOR: 60
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            pkg-config libssl-dev
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --workspace --fail-under-lines $LINE_COVERAGE_FLOOR --summary-only

  deps:
    name: dep audit (licences / advisories / sources)
    runs-on: ubuntu-latest
    # cargo-deny is a single static binary; no GUI deps needed.
    # Pins the action's release tag so a malicious tag move can't
    # silently rewrite the audit step.
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features --workspace

  build-macos:
    name: build (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-bundle --locked || true
      - run: cargo build --release -p llm-usage-tray -p llm-usage-dashboard -p llm-usage-setup -p llm-usage
      - run: cargo bundle --release -p llm-usage-tray
      - uses: actions/upload-artifact@v4
        with:
          name: llm-usage-macos
          path: target/release/bundle/osx/llm-usage.app
